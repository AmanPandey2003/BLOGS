<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Background with subtle border -->
  <rect width="400" height="400" fill="#FAF9F6" rx="20" stroke="#1E1E1E" stroke-width="4"/>
  
  <!-- Head & Neck shadow -->
  <path d="M 200 240 L 175 300 L 225 300 Z" fill="#B07246" />
  
  <!-- Neck -->
  <rect x="175" y="230" width="50" height="50" fill="#C48255" />
  <path d="M 175 270 Q 200 290 225 270 L 225 280 L 175 280 Z" fill="#B07246" />
  
  <!-- Face/Head shape -->
  <path d="M 140 140 C 140 110, 260 110, 260 140 C 260 210, 240 240, 200 240 C 160 240, 140 210, 140 140 Z" fill="#D08B5B" />
  
  <!-- Ears -->
  <circle cx="135" cy="165" r="15" fill="#C48255" />
  <circle cx="265" cy="165" r="15" fill="#C48255" />
  <circle cx="135" cy="165" r="8" fill="#D08B5B" />
  <circle cx="265" cy="165" r="8" fill="#D08B5B" />
  
  <!-- Hair (Neat, Short, Black) -->
  <path d="M 135 140 C 135 70, 265 70, 265 140 C 265 110, 250 95, 230 90 C 215 85, 185 85, 170 90 C 150 95, 135 110, 135 140 Z" fill="#1E1E1E" />
  <!-- Sideburns -->
  <path d="M 135 140 L 140 170 L 145 170 L 142 140 Z" fill="#1E1E1E" />
  <path d="M 265 140 L 260 170 L 255 170 L 258 140 Z" fill="#1E1E1E" />

  <!-- Eyes (Eyebrows + Eyes) -->
  <!-- Left Eyebrow -->
  <path d="M 160 140 Q 175 132 185 140" stroke="#1E1E1E" stroke-width="4" stroke-linecap="round" fill="none" />
  <!-- Right Eyebrow -->
  <path d="M 215 140 Q 225 132 240 140" stroke="#1E1E1E" stroke-width="4" stroke-linecap="round" fill="none" />
  <!-- Left Eye -->
  <ellipse cx="172" cy="150" rx="8" ry="5" fill="#FFFFFF" stroke="#1E1E1E" stroke-width="2" />
  <circle cx="172" cy="150" r="4" fill="#1E1E1E" />
  <circle cx="174" cy="148" r="1.5" fill="#FFFFFF" />
  <!-- Right Eye -->
  <ellipse cx="228" cy="150" rx="8" ry="5" fill="#FFFFFF" stroke="#1E1E1E" stroke-width="2" />
  <circle cx="228" cy="150" r="4" fill="#1E1E1E" />
  <circle cx="230" cy="148" r="1.5" fill="#FFFFFF" />

  <!-- Nose -->
  <path d="M 200 150 L 195 185 Q 200 190 205 185 Z" fill="#B07246" opacity="0.7" />

  <!-- Facial Hair (Light mustache, goatee) -->
  <!-- Mustache -->
  <path d="M 175 200 Q 200 190 225 200 Q 200 203 175 200 Z" fill="#1E1E1E" />
  <!-- Goatee/Chin Beard -->
  <path d="M 185 222 Q 200 220 215 222 C 215 235, 205 240, 200 240 C 195 240, 185 235, 185 222 Z" fill="#1E1E1E" />
  <path d="M 195 208 Q 200 210 205 208 L 202 215 L 198 215 Z" fill="#1E1E1E" /> <!-- Under lip patch -->

  <!-- Lips -->
  <path d="M 188 210 Q 200 215 212 210" stroke="#A8574B" stroke-width="2.5" stroke-linecap="round" fill="none" />

  <!-- Collar / Shirt (Light Blue-Grey) -->
  <path d="M 120 400 C 120 320, 280 320, 280 400 Z" fill="#A1B5D8" />
  <!-- Collar Fold Left -->
  <path d="M 175 280 L 140 320 L 175 330 Z" fill="#BCCCE0" stroke="#1E1E1E" stroke-width="2" />
  <!-- Collar Fold Right -->
  <path d="M 225 280 L 260 320 L 225 330 Z" fill="#BCCCE0" stroke="#1E1E1E" stroke-width="2" />
  <!-- V-Neck shadow -->
  <path d="M 175 280 L 200 325 L 225 280 Z" fill="#C48255" />
  <path d="M 198 325 L 198 400" stroke="#899DBE" stroke-width="2" />
</svg>
